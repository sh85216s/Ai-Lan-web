        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #22d3ee;
        }

            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        }

                                                        <button onClick={() => handleCopyCommand(activeStyleData.enPrompt, 'copy-ref-en')} className="bg-white text-slate-900 px-4 py-1.5 rounded-lg font-bold text-[10px] hover:bg-slate-200 transition-all shadow-xl flex items-center gap-2 min-w-[80px] justify-center whitespace-nowrap h-full"><Icon name="Copy" size={12} /><span>{copiedType === 'copy-ref-en' ? t.copied : t.copy}</span></button>
                                                    </div>
                                                    <p className="text-slate-400 text-xs leading-relaxed font-mono opacity-80">{activeStyleData.enPrompt}</p>
                                                </div>
                                            </div>
                                            <div className="flex flex-col gap-3 w-full lg:w-64 shrink-0">
                                                <button onClick={() => handleCopyCommand(`${activeStyleData.zhPrompt}\n\n${activeStyleData.enPrompt}`, 'ref-copy')} className={`flex-1 py-4 rounded-xl font-bold flex flex-col items-center justify-center gap-2 transition-all active:scale-95 shadow-xl btn-press bg-white text-slate-900 hover:bg-slate-200 whitespace-nowrap`}><Icon name={copiedType === 'ref-copy' ? "Check" : "Copy"} size={22} /><span className="text-sm uppercase font-black tracking-widest">{copiedType === 'ref-copy' ? t.copied : t.copyMulti}</span></button>
                                                <a href="https://notebooklm.google.com/" target="_blank" className={`flex-1 py-4 bg-cyan-400 hover:brightness-110 text-black rounded-xl font-black flex flex-col items-center justify-center gap-2 shadow-xl transition-all active:scale-95 border-2 border-cyan-300 group btn-press whitespace-nowrap`}><img src={notebookLMLogo} alt="Icon" className="w-6 h-6 group-hover:scale-110 transition-transform object-contain" /><span className="text-sm uppercase font-black tracking-widest">{t.goto}</span></a>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="mt-12 pt-8 border-t border-slate-700 flex justify-center">
                                        <button onClick={() => setActiveTab('generator')} className="text-slate-600 hover:text-cyan-400 text-[11px] font-black flex items-center gap-3 tracking-[0.4em] transition-all group uppercase text-style-fix"><Icon name="Wand2" size={16} className="group-hover:rotate-12 transition-transform" /><span>{t.back}</span></button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    <footer className="w-full mt-2 pt-6 pb-12 bg-black/90 backdrop-blur-md animate-in border-t border-slate-800/40">
                        <div className="max-w-[1300px] mx-auto px-8 flex flex-col items-center gap-6 text-center">
                            <div className="animate-in mb-2 px-4 max-w-4xl">
                                <p className="text-yellow-400 text-[13px] leading-relaxed font-medium">{t.disclaimer}</p>
                            </div>
                            <div className="flex flex-row gap-5 justify-center items-center flex-nowrap w-full overflow-x-auto custom-scrollbar pb-2">
                                <a href="https://meikochang.github.io/line-sticker-factory3.0/" target="_blank" className="bg-line-official hover:opacity-90 text-white text-[13px] font-black px-10 py-3.5 rounded-full transition-all shadow-xl flex items-center gap-3 btn-press whitespace-nowrap flex-shrink-0"><Icon name="ExternalLink" size={18} /><span>{i18n[lang].line}</span></a>
                                <a href="https://www.youtube.com/@meiko1" target="_blank" className="bg-youtube-official hover:opacity-90 text-white text-[13px] font-black px-10 py-3.5 rounded-full transition-all shadow-xl flex items-center gap-3 btn-press whitespace-nowrap flex-shrink-0"><Icon name="Youtube" size={18} /><span>{i18n[lang].youtube}</span></a>
                                <a href="https://discord.gg/BMRHfGas" target="_blank" className="bg-discord-official hover:opacity-90 text-white text-[13px] font-black px-10 py-3.5 rounded-full transition-all shadow-xl flex items-center gap-3 btn-press whitespace-nowrap flex-shrink-0"><Icon name="Discord" size={18} /><span>{i18n[lang].discord}</span></a>
                            </div>
                            <div className="space-y-1">
                                <div className="text-sm font-medium text-slate-600 tracking-normal opacity-80">{t.footerCopy}</div>
                                <p className="text-[13px] text-slate-700 leading-relaxed font-normal">{t.footerNote} <a href="https://www.youtube.com/@meiko1" target="_blank" className="text-cyan-400 font-bold hover:text-cyan-300">【Meiko微課頻道】</a></p>
                                <div className="mt-2 pt-2 border-t border-slate-800"><p className="text-[14px] text-white font-normal opacity-70">{t.footerContact}</p></div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
